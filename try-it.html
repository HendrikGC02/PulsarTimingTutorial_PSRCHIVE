<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<title>Try it — PSRCHIVE tutorial</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/site.css" />
<style>
  /* Try-it is an IDE — it owns its own dark chrome and ignores the theme toggle for the workspace itself. The site header still themes. */
  .ipg-shell { width: 100%; max-width: 1300px; margin: 0 auto; }
</style>
<script>
  (function () {
    try {
      var t = localStorage.getItem("psrchive-theme");
      if (t) document.documentElement.setAttribute("data-theme", t);
    } catch (e) {}
  })();
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="scripts/diagrams.jsx"></script>
<script type="text/babel" src="scripts/tryit.jsx"></script>
<script type="text/babel">
  function TryItPage() {
    return (
      <div>
        <SiteHeader active="play" />
        <div className="ipg-shell"><InteractiveV2 /></div>
        <SiteFooter />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<TryItPage />);
</script>
</body>
</html>
